version: 2.1
setup: true

change-filters: &change-filters
  branches:
    ignore: master

trunk-filters: &trunk-filters
  branches:
    only: master

orbs:
  continuation: circleci/continuation@1.1.0
  github-cli: circleci/github-cli@3.0.0
  security: studion/security@2.1.0
  shellcheck: circleci/shellcheck@3.4.0

parameters:
  scheduled_image_env_updates:
    type: boolean
    default: false

jobs:
  scan-dockerfile:
    executor: security/node
    steps:
      - checkout
      - security/scan_dockerfile
  validate-automation:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Validate update automation
          command: ./scripts/updates/validate.sh
  update-image-env-files:
    docker:
      - image: cimg/node:lts
    environment:
      DISCOVERY_REPORT_PATH: /tmp/node-update-discovery.json
    steps:
      - checkout
      - run:
          name: Configure Git
          command: |
            git config user.name "studion-images[bot]"
            git config user.email "305842011+studion-images[bot]@users.noreply.github.com"
            git config --global --unset-all url."ssh://git@github.com/".insteadOf 2>/dev/null || true
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
            git config --global url."https://github.com/".insteadOf "git@github.com:"
      - github-cli/setup:
          auth_method: app
      - run:
          name: Discover and apply Node updates
          command: ./scripts/updates/discover-node-updates.js --apply
      - run:
          name: Create or update node-secrets PR
          command: ./scripts/updates/publish-node-updates-pr.sh secrets
      - run:
          name: Create or update node-security PR
          command: ./scripts/updates/publish-node-updates-pr.sh security
      - run:
          name: Update node-security dependency gate
          command: ./scripts/updates/update-security-pr-gate.sh
      - store_artifacts:
          path: /tmp/node-update-discovery.json
          destination: node-update-discovery.json
  detect-image-changes:
    executor: continuation/default
    steps:
      - checkout
      - run:
          name: Install Yq
          command: ./scripts/install-yq.sh
      - run:
          name: Detect image changes
          command: ./scripts/detect-image-changes.sh
      - continuation/continue:
          configuration_path: .circleci/push-image.yml

workflows:
  run-image-automation:
    when: <<pipeline.parameters.scheduled_image_env_updates>>
    jobs:
      - update-image-env-files
  scan-and-detect:
    unless: <<pipeline.parameters.scheduled_image_env_updates>>
    jobs:
      - shellcheck/check:
          external_sources: true
          filters: *change-filters
      - scan-dockerfile:
          filters: *change-filters
      - security/detect_secrets_git:
          filters: *change-filters
      - validate-automation:
          filters: *change-filters
      - security/detect_secrets_dir:
          filters: *trunk-filters
      - detect-image-changes:
          filters: *trunk-filters
          requires:
            - shellcheck/check
            - scan-dockerfile
            - security/detect_secrets_git
            - security/detect_secrets_dir
            - validate-automation
